name: Deploy Demo to GitHub Pages

on:
  push:
    branches:
      - dev
      - 'feature/*'
    paths:
      - 'demo/**'
      - 'html/custom/view/announcer-jammers*'
      - '.github/workflows/demo-pages.yml'

  # Allow manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Branch to deploy (default: current branch)'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Copy canonical view files into demo/ (resolves symlinks for static Pages deploy)
      - name: Resolve canonical view files
        run: |
          rm -f demo/announcer-jammers-render.js demo/announcer-jammers.css
          cp html/custom/view/announcer-jammers-render.js demo/announcer-jammers-render.js
          cp html/custom/view/announcer-jammers.css demo/announcer-jammers.css

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Write deploy info so the live site shows which branch is deployed
      - name: Stamp deploy info
        run: |
          echo '{"branch":"${{ github.ref_name }}","sha":"${{ github.sha }}","deployedAt":"${{ github.event.repository.updated_at }}"}' > demo/deploy-info.json

      - name: Upload artifact (demo/ directory)
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
